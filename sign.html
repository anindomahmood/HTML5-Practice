<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body style="background-color: pink;">
    <header>
       <div style="background-color:palevioletred;">
        <h1 style="text-align: center;color:black">Form<h1>
        </div>
    </header>

    <main>
        <form>
            <div style="text-align: center;">
            Name: <input type="text" placeholder="name" >
            <br>
            <br>
            Profession: <input type="text" placeholder="profession" >
            <br>
            <br>
            Password: <input type="password" placeholder="password">
            <br>
            <br>
            Gender:
            <label for="101">
                <input type="radio" value="Male" name="class"id="101">Male</label>
            <label for="102">
                <input type="radio" value="Female" name="class" id="102">Female</label>
                <br>
                <br>
                Location:
                <select name="city">
                <option>Dhaka</option>
                <option>Rajshahi</option>
                <option>Sylhet</option>
                <option>Chittagong</option>
                <option>Barishal</option>
                <option>Khulna</option>
                <option>Rangpur</option>
                </select>
                <br>
                <br>
                Favorite:
                <label for="104">
                    <input type="checkbox" value="home page" name="page" id="104">Home
                </label>
                <label for="105">
                     <input type="checkbox" value="education" name="page" id="105">Education
                </label>
                <label for="106">
                     <input type="checkbox" value="form" name="page" id="106">Form
                </label>
                <label for="107">
                  <input type="checkbox" value="Content" name="page" id="107">Content
                </label>
               
                <br>
                <br>
                Feedback:
                <textarea name="feedback" id="101" placeholder="feedback" rows="5"></textarea>
                <br>
                <input type="submit" value="submit">
                <button>go</button>
            </div>
        </form>
    </main>

    <footer style="text-align: center;">
        <p>Contact me:anindomahmoood1@gmail.com</p>
    </footer>
</body>
</html>
